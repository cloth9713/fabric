<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>布料供應商</title>

<style>

body{
    margin:0;
    font-family: "Segoe UI", sans-serif;
    background:#f8f8f8;
}

/* ===== Header ===== */
header{
    position:relative;
    height:300px;
    background:url('banner.jpg') center/cover no-repeat;
    color:white;
}

header .overlay{
    background:rgba(0,0,0,0.5);
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

header h1{
    font-size:40px;
    margin:0;
}

header p{
    margin-top:10px;
}

/* ===== nav ===== */
nav{
    background:#222;
    padding:12px;
    text-align:center;
    position:sticky;
    top:0;
}

nav a{
    color:white;
    margin:0 15px;
    text-decoration:none;
    font-weight:bold;
}

/* ===== section ===== */
.container{
    padding:40px 20px;
}

.section{
    margin-bottom:60px;
}

.section h2{
    text-align:center;
    margin-bottom:25px;
}

/* ===== 卡片圖片 ===== */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    transition:0.3s;
}

.card:hover img{
    transform:scale(1.1);
}

/* ===== 圖片放大 ===== */
.modal{
    display:none;
    position:fixed;
    z-index:999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
}

.modal img{
    display:block;
    max-width:90%;
    max-height:90%;
    margin:5% auto;
}

/* ===== footer ===== */
footer{
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
}

</style>
</head>

<body>

<!-- Banner -->
<header>
<div class="overlay">
<h1>布料供應商</h1>
<p>高品質布料｜批發零售｜各式機能布</p>
</div>
</header>

<!-- 導覽 -->
<nav>
<a href="#f1">素面布</a>
<a href="#f2">格子布</a>
<a href="#f3">條紋布</a>
<a href="#f4">機能布</a>
<a href="#f5">包包布</a>
<a href="#f6">羊毛布</a>
</nav>

<div class="container">

<!-- 1 -->
<div class="section" id="f1">
<h2>1. 素面布</h2>
<div class="grid">
<div class="card"><img src="plain1.jpg" onclick="openImg(this)"></div>
<div class="card"><img src="plain2.jpg" onclick="openImg(this)"></div>
</div>
</div>

<!-- 2 -->
<div class="section" id="f2">
<h2>2. 格子布</h2>
<div class="grid">
<img src="check1.jpg" onclick="openImg(this)">
<img src="check2.jpg" onclick="openImg(this)">
<img src="check3.jpg" onclick="openImg(this)">
<img src="check4.jpg" onclick="openImg(this)">
<img src="check5.jpg" onclick="openImg(this)">
<img src="check6.jpg" onclick="openImg(this)">
<img src="check7.jpg" onclick="openImg(this)">
<img src="check8.jpg" onclick="openImg(this)">
<img src="check9.jpg" onclick="openImg(this)">
<img src="check10.jpg" onclick="openImg(this)">
</div>
</div>

<!-- 3 -->
<div class="section" id="f3">
<h2>3. 條紋布</h2>
<div class="grid">
<img src="stripe1.jpg" onclick="openImg(this)">
<img src="stripe2.jpg" onclick="openImg(this)">
<img src="stripe3.jpg" onclick="openImg(this)">
</div>
</div>

<!-- 4 -->
<div class="section" id="f4">
<h2>4. 防潑水四面彈機能布</h2>
<div class="grid">
<img src="water1.jpg" onclick="openImg(this)">
<img src="water2.jpg" onclick="openImg(this)">
<img src="water3.jpg" onclick="openImg(this)">
</div>
</div>

<!-- 5 -->
<div class="section" id="f5">
<h2>5. 包包布</h2>
<div class="grid">
<img src="bag1.jpg" onclick="openImg(this)">
<img src="bag2.jpg" onclick="openImg(this)">
<img src="bag3.jpg" onclick="openImg(this)">
</div>
</div>

<!-- 6 -->
<div class="section" id="f6">
<h2>6. 聚酯羊毛機能布</h2>
<div class="grid">
<img src="wool1.jpg" onclick="openImg(this)">
<img src="wool2.jpg" onclick="openImg(this)">
<img src="wool3.jpg" onclick="openImg(this)">
</div>
</div>

</div>

<!-- 放大圖片 -->
<div class="modal" id="modal" onclick="closeImg()">
<img id="modalImg">
</div>

<footer>
<p>© 2026 布料供應商</p>
</footer>

<script>
function openImg(img){
    document.getElementById("modal").style.display="block";
    document.getElementById("modalImg").src=img.src;
}

function closeImg(){
    document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
